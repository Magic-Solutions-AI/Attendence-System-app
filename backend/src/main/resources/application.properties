spring.application.name=backend
server.port=8080

# Load environment variables from .env file
spring.config.import=optional:file:.env[.properties]

# SQLite Database
spring.datasource.url=jdbc:sqlite:./data/attendx.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flask Face Recognition Service
face.api.url=${FACE_API_URL:http://127.0.0.1:5000}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:placeholder@gmail.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
